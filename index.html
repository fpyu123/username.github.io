<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复兴国际</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            background-image: url('2026-03-08_20-04-25.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
            background-color: #000; /* 防止图片未加载时全白 */
        }

        /* 链接容器 */
        .link-container {
            position: relative;
            z-index: 2;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.4); /* 调深了背景遮罩，让金字更明显 */
            padding: 20px 40px;
            border-radius: 15px;
            border: 1px solid rgba(184, 134, 11, 0.3); /* 增加淡淡的金边框 */
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* 核心修改：链接样式 */
        .link-item {
            display: block;
            font-size: 26px; /* 略微加大 */
            font-weight: bold; /* 加粗是清晰的关键 */
            text-decoration: none;
            margin: 25px 0;
            padding: 5px 10px;
            transition: all 0.3s ease;

            /* 使用更深的重金属金渐变 */
            background: linear-gradient(to bottom, #cf9e2e 0%, #8b6508 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;

            /* 关键：多重阴影确保清晰度 */
            /* 1像素的深色描边效果 + 下方投影 */
            text-shadow: 
                1px 1px 0px rgba(0,0,0,0.8), 
                2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 鼠标悬停效果 */
        .link-item:hover {
            transform: scale(1.05);
            /* 悬停时稍微变亮，增加交互感 */
            background: linear-gradient(to bottom, #ffd700 0%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .link-item {
                font-size: 20px;
                margin: 15px 0;
            }
            .link-container {
                padding: 15px 25px;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="link-container">
        <a href="https://work.weixin.qq.com/ca/cawcde47faa74c453f" class="link-item">皇冠足球：点击联系客服</a>
        <a href="https://work.weixin.qq.com/ca/cawcde47faa74c453f" class="link-item">香港六合彩：点击联系客服</a>
        <a href="https://work.weixin.qq.com/ca/cawcde47faa74c453f" class="link-item">澳门六合彩：点击联系客服</a>
        <a href="https://work.weixin.qq.com/ca/cawcde47faa74c453f" class="link-item">澳洲时时彩：点击联系客服</a>
        <a href="https://work.weixin.qq.com/ca/cawcde47faa74c453f" class="link-item">HH德扑圈：点击联系客服</a>
    </div>
</body>
</html>
